name: wlm
description: worship lyrics mara & mizo app.
publish_to: 'none'
version: 1.2.0+5

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 🔗 Core packages
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4

  # 🎨 UI
 
  buttons_tabbar: ^1.3.8

  # ⚙️ Utilities
  shared_preferences: ^2.2.3
  get_it: ^7.7.0

  # 🌐 Features
  url_launcher: ^6.2.5
  google_mobile_ads: ^5.1.0
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.9.3

flutter_icons:
  image_path: "app_logo.png"
  android: true
  ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/lili.png

  